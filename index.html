<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholar-Link | T⁴Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 max-w-md mx-auto min-h-screen pb-20">
    <nav class="p-6 bg-white border-b flex justify-between items-center sticky top-0">
        <h1 class="font-black text-blue-700 italic">T⁴ SCHOLAR-LINK</h1>
        <button onclick="sendSOS()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase animate-pulse">SOS</button>
    </nav>

    <main class="p-6 space-y-6">
        <div class="bg-blue-700 p-6 rounded-3xl text-white shadow-xl">
            <div class="flex justify-between items-start mb-4">
                <p class="text-[10px] font-bold uppercase opacity-70 tracking-widest">Morning Run</p>
                <span id="capacity" class="text-xs font-black italic">12 / 15</span>
            </div>
            <div class="w-full bg-blue-900/30 h-3 rounded-full overflow-hidden">
                <div id="bar" class="bg-yellow-400 h-full transition-all" style="width: 80%;"></div>
            </div>
        </div>

        <div class="space-y-3" id="manifest">
            <div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                <div><p class="font-bold text-sm">Karabo M.</p><p class="text-[10px] text-slate-400">Villa Liza Ext 2</p></div>
                <button onclick="board(this, 'Karabo')" class="text-[10px] font-black bg-slate-100 px-4 py-2 rounded-xl uppercase">Board</button>
            </div>
        </div>
    </main>

    <script>
        let count = 12;
        function board(btn, name) {
            if (count < 15) {
                count++;
                btn.innerText = "IN VAN";
                btn.classList.replace('bg-slate-100', 'bg-green-500');
                btn.classList.add('text-white');
                document.getElementById('capacity').innerText = `${count} / 15`;
                document.getElementById('bar').style.width = `${(count/15)*100}%`;
                if(count === 15) document.getElementById('bar').classList.replace('bg-yellow-400', 'bg-red-500');
            }
        }
        function sendSOS() {
            window.open(`https://wa.me/?text=EMERGENCY: T4 Scholar Transport breakdown at current location. All children are safe. Assistance needed!`);
        }
    </script>
</body>
</html>
