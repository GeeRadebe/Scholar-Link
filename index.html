<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholar-Link | T⁴ Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-bar { transition: width 0.5s ease-in-out; }
        .emergency-pulse { animation: alert-red 1.5s infinite; }
        @keyframes alert-red { 
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans max-w-md mx-auto min-h-screen flex flex-col">

    <nav class="p-6 bg-white border-b border-slate-200 sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-blue-700 uppercase">Scholar-Link</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">T⁴ Safety Pillar</p>
        </div>
        <button onclick="alert('Emergency Ping Sent to Parents & GTR Hub!')" class="emergency-pulse bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">SOS</button>
    </nav>

    <main class="p-6 space-y-6 flex-grow">
        
        <div class="bg-blue-700 rounded-3xl p-6 text-white shadow-xl shadow-blue-200">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <p class="text-[10px] font-bold text-blue-200 uppercase">Current Trip</p>
                    <h2 class="text-xl font-bold">Morning School Run</h2>
                </div>
                <span class="bg-blue-500/30 text-xs px-3 py-1 rounded-full border border-blue-400/30 font-bold uppercase">En Route</span>
            </div>
            
            <div class="space-y-2">
                <div class="flex justify-between text-xs font-bold">
                    <span>Van Capacity (Legal)</span>
                    <span id="capacity-text">12 / 15 Kids</span>
                </div>
                <div class="w-full bg-blue-900/30 h-3 rounded-full overflow-hidden border border-blue-400/20">
                    <div id="capacity-bar" class="bg-yellow-400 h-full loading-bar shadow-[0_0_10px_rgba(250,204,21,0.5)]" style="width: 80%;"></div>
                </div>
            </div>
        </div>

        <section>
            <h3 class="text-sm font-black text-slate-400 uppercase mb-4 tracking-widest px-1">Passenger Manifest</h3>
            <div class="space-y-3">
                <div class="bg-white p-4 rounded-2xl border border-slate-200 flex justify-between items-center shadow-sm hover:border-blue-300 transition-colors">
                    <div class="flex items-center gap-3">
                        <div class="h-10 w-10 bg-blue-50 rounded-full flex items-center justify-center font-black text-blue-600 text-xs">KM</div>
                        <div>
                            <p class="text-sm font-bold">Karabo M.</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Villa Liza -> Primary A</p>
                        </div>
                    </div>
                    <button onclick="toggleInVan(this)" class="text-[10px] font-black bg-slate-100 px-4 py-2 rounded-xl transition-all uppercase tracking-tight">Board</button>
                </div>

                <div class="bg-white p-4 rounded-2xl border border-slate-200 flex justify-between items-center shadow-sm hover:border-blue-300 transition-colors">
                    <div class="flex items-center gap-3">
                        <div class="h-10 w-10 bg-blue-50 rounded-full flex items-center justify-center font-black text-blue-600 text-xs">ST</div>
                        <div>
                            <p class="text-sm font-bold">Sipho T.</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase">Dawn Park -> High School</p>
                        </div>
                    </div>
                    <button onclick="toggleInVan(this)" class="text-[10px] font-black bg-slate-100 px-4 py-2 rounded-xl transition-all uppercase tracking-tight">Board</button>
                </div>
            </div>
        </section>

        <div class="bg-slate-900 rounded-3xl p-5 text-white">
            <h4 class="text-[10px] font-black text-slate-500 mb-4 uppercase tracking-widest">Route Tracker</h4>
            <div class="space-y-4">
                <div class="flex gap-3 items-start">
                    <div class="h-2 w-2 mt-1.5 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.5)]"></div>
                    <p class="text-xs font-bold text-slate-300 uppercase tracking-tight">Pickups: Villa Liza Ext 2 (Done)</p>
                </div>
                <div class="flex gap-3 items-start">
                    <div class="h-2 w-2 mt-1.5 rounded-full bg-yellow-400 shadow-[0_0_10px_rgba(250,204,21,0.5)]"></div>
                    <p class="text-xs font-bold text-slate-300 uppercase tracking-tight">En Route: Dawn Park Hub</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-6 bg-white border-t border-slate-200 grid grid-cols-2 gap-4">
        <button class="bg-slate-100 text-slate-600 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all">Log Issue</button>
        <button class="bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-blue-200 active:scale-95 transition-all">End Trip</button>
    </footer>

    <script>
        function toggleInVan(btn) {
            if (btn.innerText === "BOARD") {
                btn.innerText = "IN VAN";
                btn.classList.replace('bg-slate-100', 'bg-green-500');
                btn.classList.add('text-white');
            } else {
                btn.innerText = "BOARD";
                btn.classList.replace('bg-green-500', 'bg-slate-100');
                btn.classList.remove('text-white');
            }
        }
    </script>

</body>
</html>
